name: 部署到 GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
  # 允许手动从 Actions 页面触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限，允许写入 gh-pages 分支
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 检出仓库
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: 安装依赖
        run: npm ci

      # 4. 构建生产版本
      # VITE_BASE_URL 设置为 /<repo-name>/ 以匹配 GitHub Pages 子路径
      - name: 构建生产版本
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      # 5. 将 dist 目录发布到 gh-pages 分支
      - name: 发布到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 保留 gh-pages 分支的提交历史
          keep_files: false
          # 自定义提交信息
          commit_message: "deploy: ${{ github.sha }}"
